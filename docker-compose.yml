version: '3.8'

services:
  app:
    image: webdevops/php-nginx:8.2
    container_name: plantas_app
    ports:
      - "8080:80"
    environment:
      - WEB_DOCUMENT_ROOT=/app/public
      - PHP_DATE_TIMEZONE=UTC
    volumes:
      - .:/app
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: plantas_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: repo_plantas
    volumes:
      - db_plantas_data:/var/lib/mysql

volumes:
  db_plantas_data:
